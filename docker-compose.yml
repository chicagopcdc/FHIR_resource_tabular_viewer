services:
  backend:
    build:
      context: .
      dockerfile: fhir-backend-dynamic/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      target: prod
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

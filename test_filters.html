<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dynamic Filters</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Dynamic Filter Sidebar Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Fetch DocumentReference Filters</h2>
        <button onclick="testResourceFilters('DocumentReference')">Test DocumentReference</button>
        <div id="result-DocumentReference" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Fetch Observation Filters</h2>
        <button onclick="testResourceFilters('Observation')">Test Observation</button>
        <div id="result-Observation" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Fetch Multiple Resource Filters</h2>
        <button onclick="testMultipleResources()">Test DocumentReference + Observation</button>
        <div id="result-multiple" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        
      async function fetchWithRetry(url, options = {}, retries = 3, backoff = 300) {
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response;
        } catch (err) {
            if (retries <= 1) throw err;
            console.warn(`Retrying... (${retries - 1} left). Error: ${err.message}`);
            // Wait before retrying (Exponential Backoff principle)
            await new Promise(res => setTimeout(res, backoff));
            return await fetchWithRetry(url, options, retries - 1, backoff * 2);
        }
    }

    async function fetchFilters(resourceType) {
        try {
            const queryParams = new URLSearchParams({ sample_size: '20' });
            const url = `${API_BASE}/filters/${resourceType}/metadata?${queryParams}`;
            
            console.log(`Fetching filters from: ${url}`);
            
            // UPDATE: Use the retry wrapper instead of raw fetch
            const response = await fetchWithRetry(url);
            
            return await response.json();
        } catch (error) {
            console.error(`Error fetching ${resourceType} filters:`, error);
            throw error;
        }
    }
        async function testResourceFilters(resourceType) {
            const resultEl = document.getElementById(`result-${resourceType}`);
            resultEl.innerHTML = '🔄 Loading...';
            resultEl.className = 'result';
            
            try {
                const data = await fetchFilters(resourceType);
                
                if (data.success && data.filters) {
                    resultEl.innerHTML = `
                        <strong>✅ Success!</strong><br>
                        Resource: ${data.resource_type}<br>
                        Filter Count: ${data.filters.length}<br>
                        Sample Size: ${data.sample_size}<br>
                        Filters: ${data.filters.map(f => `${f.label} (${f.options?.length || 0} options)`).join(', ')}
                    `;
                    resultEl.className = 'result success';
                } else {
                    throw new Error(data.message || 'No filters returned');
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
                resultEl.className = 'result error';
            }
        }
        
        async function testMultipleResources() {
            const resultEl = document.getElementById('result-multiple');
            resultEl.innerHTML = '🔄 Loading multiple resources...';
            resultEl.className = 'result';
            
            try {
                const resourceTypes = ['DocumentReference', 'Observation'];
                const results = {};
                
                for (const resourceType of resourceTypes) {
                    console.log(`Fetching filters for ${resourceType}...`);
                    results[resourceType] = await fetchFilters(resourceType);
                }
                
                let html = '<strong>✅ Multiple Resource Filters Loaded!</strong><br><br>';
                
                Object.entries(results).forEach(([resourceType, data]) => {
                    if (data.success && data.filters) {
                        html += `<strong>${resourceType}:</strong> ${data.filters.length} filters<br>`;
                        data.filters.forEach(filter => {
                            html += `&nbsp;&nbsp;• ${filter.label}: ${filter.options?.length || 0} options<br>`;
                        });
                        html += '<br>';
                    }
                });
                
                resultEl.innerHTML = html;
                resultEl.className = 'result success';
                
                // Demonstrate the behavior expected by the DynamicFilterSidebar
                console.log('Available filters structure:', results);
                
            } catch (error) {
                resultEl.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
                resultEl.className = 'result error';
            }
        }
    </script>
</body>
</html>
